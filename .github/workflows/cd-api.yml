name: Deploy API to Azure Container Apps

on:
  push:
    branches:
      - main
    paths:
      - "src/backend/**"
  workflow_dispatch:

env:
  REGISTRY: ${{ vars.AZURE_CONTAINER_REGISTRY }}
  ACR_AGENT_POOL: ${{ vars.AZURE_ACR_AGENT_POOL }}
  IMAGE_NAME: cadence-api
  CONTAINER_APP_NAME: ${{ vars.AZURE_CONTAINER_APP_NAME }}
  RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}

permissions:
  id-token: write
  contents: read

jobs:
  build-and-deploy:
    runs-on: [self-hosted, linux, x64, cadence-private]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2.3.0
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Build and push image using ACR Tasks
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${{ env.ACR_AGENT_POOL }}" ]; then
            echo "AZURE_ACR_AGENT_POOL is required"
            exit 1
          fi

          az acr build \
            --registry "${{ env.REGISTRY }}" \
            --agent-pool "${{ env.ACR_AGENT_POOL }}" \
            --image "${{ env.IMAGE_NAME }}:${{ github.sha }}" \
            --image "${{ env.IMAGE_NAME }}:latest" \
            --file ./src/backend/Dockerfile \
            .

      - name: Deploy to Azure Container Apps
        shell: bash
        run: |
          set -euo pipefail
          az containerapp update \
            --name "${{ env.CONTAINER_APP_NAME }}" \
            --resource-group "${{ env.RESOURCE_GROUP }}" \
            --image "${{ env.REGISTRY }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}"

      - name: Verify deployment
        shell: bash
        run: |
          set -euo pipefail

          # Wait for the new revision to be ready
          echo "Waiting for deployment to complete..."
          sleep 30

          # Get the container app URL
          FQDN=$(az containerapp show \
            --name "${{ env.CONTAINER_APP_NAME }}" \
            --resource-group "${{ env.RESOURCE_GROUP }}" \
            --query "properties.configuration.ingress.fqdn" \
            --output tsv)

          echo "Container App URL: https://$FQDN"

          # Health check
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://$FQDN/health" || echo "000")

          if [ "$HTTP_STATUS" = "200" ]; then
            echo "✅ Health check passed (HTTP $HTTP_STATUS)"
          else
            echo "⚠️ Health check returned HTTP $HTTP_STATUS (may still be starting)"
          fi
