name: Deploy Frontend to Azure Static Web Apps

on:
  push:
    branches:
      - main
    paths:
      - "src/frontend/**"
  workflow_dispatch:

env:
  NODE_VERSION: "20"
  AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
  AZURE_STATIC_WEB_APP_NAME: ${{ vars.AZURE_STATIC_WEB_APP_NAME }}

permissions:
  id-token: write
  contents: read

jobs:
  build-and-deploy:
    runs-on: [self-hosted, linux, x64, cadence-private]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          package_json_file: src/frontend/package.json

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
          cache-dependency-path: src/frontend/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: src/frontend
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        working-directory: src/frontend
        env:
          NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_AZURE_AD_CLIENT_ID: ${{ vars.NEXT_PUBLIC_AZURE_AD_CLIENT_ID }}
          NEXT_PUBLIC_AZURE_AD_TENANT_ID: ${{ vars.NEXT_PUBLIC_AZURE_AD_TENANT_ID }}
          NEXT_PUBLIC_APPINSIGHTS_INSTRUMENTATION_KEY: ${{ vars.NEXT_PUBLIC_APPINSIGHTS_INSTRUMENTATION_KEY }}
          NEXT_PUBLIC_APPINSIGHTS_INGESTION_ENDPOINT: ${{ vars.NEXT_PUBLIC_APPINSIGHTS_INGESTION_ENDPOINT }}
        run: pnpm run build

      - name: Login to Azure
        uses: azure/login@v2.3.0
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Resolve Static Web App deployment token
        id: swa-token
        uses: azure/cli@v2.2.0
        with:
          inlineScript: |
            set -euo pipefail

            if [ -z "${{ env.AZURE_STATIC_WEB_APP_NAME }}" ]; then
              echo "AZURE_STATIC_WEB_APP_NAME is required"
              exit 1
            fi

            if [ -z "${{ env.AZURE_RESOURCE_GROUP }}" ]; then
              echo "AZURE_RESOURCE_GROUP is required"
              exit 1
            fi

            SWA_TOKEN=$(az staticwebapp secrets list \
              --name "${{ env.AZURE_STATIC_WEB_APP_NAME }}" \
              --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" \
              --query properties.apiKey \
              -o tsv)

            if [ -z "$SWA_TOKEN" ]; then
              echo "Failed to retrieve Static Web App deployment token"
              exit 1
            fi

            echo "::add-mask::$SWA_TOKEN"
            echo "deployment_token=$SWA_TOKEN" >> "$GITHUB_OUTPUT"

      - name: Deploy to Azure Static Web Apps
        run: |
          pnpm dlx @azure/static-web-apps-cli@2.0.2 deploy src/frontend/out \
            --deployment-token "${{ steps.swa-token.outputs.deployment_token }}" \
            --env production
